<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Осторожно</title>
    <style>
        body {
            background: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, sans-serif;
            margin: 0;
        }
        .text {
            text-align: center;
            padding: 20px;
        }
        .big {
            color: #cc0000;
            font-size: clamp(1.5rem, 8vw, 3.5rem);
            font-weight: 900;
            line-height: 1.3;
            text-transform: uppercase;
        }
        .small {
            color: #333;
            font-size: clamp(0.7rem, 4vw, 1rem);
            margin-top: 20px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="text">
        <div class="big">
            ТЫ ШО ДОЛБАЕБ<br>
            ПО НЕЗНАКОМЫМ КЬЮАРАМ<br>
            ПЕРЕХОДИТЬ
        </div>
        <div class="small">
            великий адъютант
        </div>
    </div>
</body>
</html>
